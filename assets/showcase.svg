<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" role="img" aria-label="AI Trinity: reliability appears only when three pillars hold at once - a low-error Model, an enforced Harness, and Memory that survives the session">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="p1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#33211a"/><stop offset="1" stop-color="#1b1512"/></linearGradient>
    <linearGradient id="p2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e2436"/><stop offset="1" stop-color="#101a24"/></linearGradient>
    <linearGradient id="p3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0f2a1c"/><stop offset="1" stop-color="#111c17"/></linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="640" rx="26" fill="url(#bg)"/>

  <!-- Header -->
  <text x="64" y="66" fill="#d97757" font-size="20" font-weight="700" letter-spacing="3">AN OPERATOR'S FIELD MANUAL</text>
  <text x="64" y="120" fill="#f1f5f9" font-size="45" font-weight="800">A great model is <tspan fill="#d97757">not enough</tspan></text>
  <text x="64" y="152" fill="#94a3b8" font-size="19">Reliability appears only when three conditions hold at the same time. A brilliant model alone is a brilliant amnesiac.</text>

  <!-- PILLAR 1 — MODEL -->
  <rect x="64" y="192" width="365" height="364" rx="18" fill="url(#p1)" stroke="#d97757" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="64" y="192" width="365" height="6" rx="3" fill="#d97757"/>
  <text x="92" y="236" fill="#e8a08a" font-size="16" font-weight="700" letter-spacing="2">PILLAR 1</text>
  <text x="92" y="300" fill="#f1f5f9" font-size="40" font-weight="800">Model</text>
  <text x="92" y="336" fill="#f2c3b3" font-size="19" font-weight="700">A provably low error rate</text>
  <g font-size="17" fill="#e2d6d0">
    <circle cx="100" cy="384" r="4" fill="#d97757"/><text x="116" y="390">The necessary foundation</text>
    <circle cx="100" cy="416" r="4" fill="#d97757"/><text x="116" y="422">but not sufficient alone</text>
    <circle cx="100" cy="448" r="4" fill="#d97757"/><text x="116" y="454">accuracy you can trust</text>
  </g>

  <!-- PILLAR 2 — HARNESS -->
  <rect x="457" y="192" width="365" height="364" rx="18" fill="url(#p2)" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="457" y="192" width="365" height="6" rx="3" fill="#38bdf8"/>
  <text x="485" y="236" fill="#7dd3fc" font-size="16" font-weight="700" letter-spacing="2">PILLAR 2</text>
  <text x="485" y="300" fill="#f1f5f9" font-size="40" font-weight="800">Harness</text>
  <text x="485" y="336" fill="#bae6fd" font-size="19" font-weight="700">An enforced method</text>
  <g font-size="17" fill="#d5e7f2">
    <circle cx="493" cy="384" r="4" fill="#38bdf8"/><text x="509" y="390">Review gates before ship</text>
    <circle cx="493" cy="416" r="4" fill="#38bdf8"/><text x="509" y="422">Skills, tools, discipline</text>
    <circle cx="493" cy="448" r="4" fill="#38bdf8"/><text x="509" y="454">the model, held to a process</text>
  </g>

  <!-- PILLAR 3 — MEMORY -->
  <rect x="850" y="192" width="366" height="364" rx="18" fill="url(#p3)" stroke="#22c55e" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="850" y="192" width="366" height="6" rx="3" fill="#22c55e"/>
  <text x="878" y="236" fill="#4ade80" font-size="16" font-weight="700" letter-spacing="2">PILLAR 3</text>
  <text x="878" y="300" fill="#f1f5f9" font-size="40" font-weight="800">Memory</text>
  <text x="878" y="336" fill="#bbf7d0" font-size="19" font-weight="700">Survives every session</text>
  <g font-size="17" fill="#d6ece0">
    <circle cx="886" cy="384" r="4" fill="#22c55e"/><text x="902" y="390">No amnesiac restarts</text>
    <circle cx="886" cy="416" r="4" fill="#22c55e"/><text x="902" y="422">Context that persists</text>
    <circle cx="886" cy="448" r="4" fill="#22c55e"/><text x="902" y="454">what you learned, kept</text>
  </g>

  <!-- simultaneity connectors (glyph only, in the gaps) -->
  <text x="443" y="380" fill="#64748b" font-size="30" font-weight="800" text-anchor="middle">+</text>
  <text x="836" y="380" fill="#64748b" font-size="30" font-weight="800" text-anchor="middle">+</text>

  <!-- Footer -->
  <rect x="64" y="582" width="1152" height="34" rx="10" fill="#0b1220" stroke="#334155" stroke-width="1"/>
  <text x="88" y="604" fill="#cbd5e1" font-size="14">
    <tspan font-weight="700" fill="#d97757">The thesis:</tspan> all three, at the same time — miss one and reliability collapses · built + battle-tested, with receipts (upstream ledger) · CC BY 4.0
  </text>
</svg>
